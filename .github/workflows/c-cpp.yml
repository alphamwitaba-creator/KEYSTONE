name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        config: [Release]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install CMake
      uses: actions/download-artifact@v4
      with:
        name: cmake
        path: C:\Program Files\CMake\bin
        
    - name: Configure
      working-directory: src-cpp
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
    
    - name: Build
      working-directory: src-cpp/build
      run: cmake --build . --config Release
