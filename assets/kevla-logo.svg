<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#ff4400"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ff6600" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="#ff660020" stroke-width="1"/>
  <circle cx="256" cy="230" r="160" fill="none" stroke="#ff660010" stroke-width="1"/>

  <!-- Main diamond -->
  <g filter="url(#shadow)">
    <polygon points="256,100 356,230 256,360 156,230" fill="url(#diamond)" filter="url(#glow)"/>
  </g>

  <!-- Inner facets -->
  <polygon points="256,100 356,230 256,230" fill="#ffffff" opacity="0.15"/>
  <polygon points="256,100 156,230 256,230" fill="#000000" opacity="0.1"/>
  <polygon points="256,360 156,230 256,230" fill="#000000" opacity="0.2"/>

  <!-- Shine -->
  <polygon points="256,100 306,165 256,180 206,165" fill="url(#shine)"/>

  <!-- Center K letter -->
  <g transform="translate(256,230)" fill="white" opacity="0.9">
    <rect x="-28" y="-45" width="8" height="90" rx="2"/>
    <polygon points="-16,-10 20,-45 32,-45 -4,-4"/>
    <polygon points="-16,10 20,45 32,45 -4,4"/>
  </g>

  <!-- Text: KEVLA -->
  <text x="256" y="430" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="white" letter-spacing="12">KEVLA</text>
  <text x="256" y="462" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="16" fill="#888" letter-spacing="6">ENGINE</text>
</svg>
